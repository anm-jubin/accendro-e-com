name: Update Store Data

# This allows you to run the robot manually from the GitHub Actions tab
on:
  workflow_dispatch:

# CRITICAL: This gives the robot permission to push the updated JSON file to your repo
permissions:
  contents: write 

jobs:
  update-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 🚀 Run Fetch Script
        run: node fetch-data.js
        
      - name: 💾 Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add products.json
          # The || echo part prevents the action from failing if you run it but no prices actually changed
          git commit -m "🤖 Auto-updated products database" || echo "No changes to commit"
          git push
